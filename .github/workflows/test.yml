---
name: Perform Jemeter performance testing

on:
  workflow_dispatch:
    inputs:
      java_version:
        description: Java version
        required: true
        type: string
        default: "17"
      jmeter_version:
        description: "Jmeter Version"
        required: true
        default: "5.6.3"
      env:
        description: 'Environment to run this test'
        required: true
        default: 'qa'
        type: string
jobs:
    MyFirstJob:
      runs-on: [ubuntu-latest]
      steps:
        - name: Excute custom workflow
          id: custom_step
          uses: ./setup-jemeter
          with:
            java_version: ${{ inputs.java_version }}
            jmeter_version: ${{ inputs.jmeter_version}}
        - name: Test this workflow
          run: |
            echo "This is test workflow"
